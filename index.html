<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Light</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #020617, #111827, #312e81);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
    }

    .card {
      width: 100%;
      max-width: 430px;
      padding: 30px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(18px);
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .icon {
      width: 110px;
      height: 110px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 56px;
      transition: 0.3s;
    }

    h1 {
      margin: 8px 0;
      font-size: 32px;
    }

    .subtitle {
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    .status {
      margin: 20px auto;
      padding: 14px 24px;
      border-radius: 999px;
      width: fit-content;
      font-size: 18px;
      font-weight: bold;
    }

    .on {
      background: #facc15;
      color: #111827;
      box-shadow: 0 0 25px #facc15;
    }

    .off {
      background: #334155;
      color: #cbd5e1;
    }

    .waiting {
      background: #38bdf8;
      color: #082f49;
    }

    .error {
      background: #ef4444;
      color: white;
    }

    .buttons {
      display: flex;
      gap: 14px;
      margin-top: 25px;
    }

    button {
      flex: 1;
      border: none;
      padding: 18px;
      border-radius: 18px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-on {
      background: #facc15;
      color: #111827;
    }

    .btn-off {
      background: #475569;
      color: white;
    }

    .info {
      margin-top: 20px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.55);
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.8;
    }

    .online {
      color: #86efac;
      font-weight: bold;
    }

    .offline {
      color: #fca5a5;
      font-weight: bold;
    }

    .footer {
      margin-top: 18px;
      color: #94a3b8;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        padding-top: 35px;
      }

      .card {
        padding: 24px 18px;
      }

      .buttons {
        flex-direction: column;
      }

      button {
        width: 100%;
        font-size: 22px;
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="icon" id="lampIcon">💡</div>

    <h1>Smart Light</h1>
    <div class="subtitle">ESP32 + Firebase + Servo SG90</div>

    <div id="statusBox" class="status waiting">Loading...</div>

    <div class="buttons">
      <button class="btn-on" onclick="sendCommand(true)">ON</button>
      <button class="btn-off" onclick="sendCommand(false)">OFF</button>
    </div>

    <div class="info">
      ESP32: <span id="espStatus" class="offline">Checking...</span><br>
      Command: <span id="commandText">-</span><br>
      Status: <span id="realStatusText">-</span><br>
      Moving: <span id="movingText">-</span>
    </div>

    <div class="footer" id="footerText">Waiting...</div>
  </div>

  <script>
    const DATABASE_URL = "https://smart-light-55cf6-default-rtdb.firebaseio.com";

    const statusBox = document.getElementById("statusBox");
    const lampIcon = document.getElementById("lampIcon");
    const footerText = document.getElementById("footerText");
    const espStatus = document.getElementById("espStatus");
    const commandText = document.getElementById("commandText");
    const realStatusText = document.getElementById("realStatusText");
    const movingText = document.getElementById("movingText");

    async function firebaseGet(path) {
      const res = await fetch(`${DATABASE_URL}/${path}.json`);
      return await res.json();
    }

    async function firebasePut(path, value) {
      await fetch(`${DATABASE_URL}/${path}.json`, {
        method: "PUT",
        body: JSON.stringify(value)
      });
    }

    async function sendCommand(state) {
      try {
        await firebasePut("lightCommand", state);

        statusBox.innerText = state ? "OPENING..." : "CLOSING...";
        statusBox.className = "status waiting";
        footerText.innerText = "Command sent to ESP32";
      } catch (e) {
        showError();
      }
    }

    async function updateData() {
      try {
        const [command, status, online, moving] = await Promise.all([
          firebaseGet("lightCommand"),
          firebaseGet("lightStatus"),
          firebaseGet("espOnline"),
          firebaseGet("moving")
        ]);

        espStatus.innerText = online ? "Online" : "Offline";
        espStatus.className = online ? "online" : "offline";

        commandText.innerText = command ? "ON requested" : "OFF requested";
        realStatusText.innerText = status ? "LIGHT ON" : "LIGHT OFF";
        movingText.innerText = moving ? "Servo moving..." : "Idle";

        if (moving) {
          statusBox.innerText = command ? "OPENING..." : "CLOSING...";
          statusBox.className = "status waiting";
          footerText.innerText = "Servo is moving";
          return;
        }

        if (command !== status) {
          statusBox.innerText = "WAITING CONFIRM";
          statusBox.className = "status waiting";
          footerText.innerText = "Waiting for ESP32 confirmation";
          return;
        }

        if (status) {
          statusBox.innerText = "LIGHT ON";
          statusBox.className = "status on";
          lampIcon.style.filter = "drop-shadow(0 0 25px #facc15)";
          footerText.innerText = "Confirmed by ESP32";
        } else {
          statusBox.innerText = "LIGHT OFF";
          statusBox.className = "status off";
          lampIcon.style.filter = "none";
          footerText.innerText = "Confirmed by ESP32";
        }

      } catch (e) {
        showError();
      }
    }

    function showError() {
      statusBox.innerText = "Connection Error";
      statusBox.className = "status error";
      footerText.innerText = "Cannot connect to Firebase";
    }

    updateData();
    setInterval(updateData, 1000);
  </script>

</body>
</html>
