<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Light Control</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #020617, #0f172a, #312e81);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .icon {
      width: 110px;
      height: 110px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 56px;
      background: rgba(255,255,255,0.15);
    }

    h1 {
      margin: 10px 0;
      font-size: 32px;
    }

    .subtitle {
      font-size: 15px;
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    .status {
      margin: 20px auto;
      padding: 14px 22px;
      border-radius: 999px;
      width: fit-content;
      font-size: 20px;
      font-weight: bold;
    }

    .on {
      background: #facc15;
      color: #111827;
      box-shadow: 0 0 25px #facc15;
    }

    .off {
      background: #334155;
      color: #cbd5e1;
    }

    .error {
      background: #ef4444;
      color: white;
    }

    .buttons {
      display: flex;
      gap: 14px;
      margin-top: 25px;
    }

    button {
      flex: 1;
      border: none;
      padding: 18px;
      border-radius: 18px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-on {
      background: #facc15;
      color: #111827;
    }

    .btn-off {
      background: #475569;
      color: white;
    }

    .footer {
      margin-top: 22px;
      font-size: 14px;
      color: #cbd5e1;
    }

    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        padding: 18px;
        padding-top: 40px;
      }

      .card {
        padding: 24px 18px;
        border-radius: 24px;
      }

      .icon {
        width: 95px;
        height: 95px;
        font-size: 48px;
      }

      h1 {
        font-size: 28px;
      }

      .buttons {
        flex-direction: column;
      }

      button {
        width: 100%;
        font-size: 22px;
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="icon" id="lampIcon">💡</div>

    <h1>Smart Light</h1>
    <div class="subtitle">By Park_Sontaya</div>

    <div id="statusBox" class="status off">
      Loading...
    </div>

    <div class="buttons">
      <button class="btn-on" onclick="setLight(true)">ON</button>
      <button class="btn-off" onclick="setLight(false)">OFF</button>
    </div>

    <div class="footer" id="footerText">
      Waiting for Firebase...
    </div>
  </div>

  <script>
    const DATABASE_URL = "https://smart-light-55cf6-default-rtdb.firebaseio.com";

    const statusBox = document.getElementById("statusBox");
    const lampIcon = document.getElementById("lampIcon");
    const footerText = document.getElementById("footerText");

    async function setLight(state) {
      try {
        await fetch(`${DATABASE_URL}/light.json`, {
          method: "PUT",
          body: JSON.stringify(state)
        });

        updateUI(state);
      } catch (error) {
        showError();
      }
    }

    async function getLightStatus() {
      try {
        const res = await fetch(`${DATABASE_URL}/light.json`);
        const state = await res.json();
        updateUI(state);
      } catch (error) {
        showError();
      }
    }

    function updateUI(state) {
      if (state === true) {
        statusBox.innerText = "LIGHT ON";
        statusBox.className = "status on";
        lampIcon.style.filter = "drop-shadow(0 0 25px #facc15)";
        footerText.innerText = "Online • Light is ON";
      } else {
        statusBox.innerText = "LIGHT OFF";
        statusBox.className = "status off";
        lampIcon.style.filter = "none";
        footerText.innerText = "Online • Light is OFF";
      }
    }

    function showError() {
      statusBox.innerText = "Connection Error";
      statusBox.className = "status error";
      footerText.innerText = "Cannot connect to Firebase";
    }

    getLightStatus();
    setInterval(getLightStatus, 1000);
  </script>

</body>
</html>
